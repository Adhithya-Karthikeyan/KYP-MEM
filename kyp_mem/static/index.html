<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYP-MEM — Know Your Project</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
:root {
  --bg-primary: #1e1e2e;
  --bg-secondary: #181825;
  --bg-tertiary: #11111b;
  --bg-hover: #313244;
  --bg-active: #45475a;
  --text-primary: #cdd6f4;
  --text-secondary: #a6adc8;
  --text-muted: #6c7086;
  --accent: #89b4fa;
  --accent-dim: #89b4fa33;
  --green: #a6e3a1;
  --peach: #fab387;
  --pink: #f5c2e7;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --border: #313244;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.layout {
  display: grid;
  grid-template-columns: 260px 1fr 280px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* Header */
.header {
  grid-column: 1 / -1;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
}

.header .logo {
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.5px;
}

.header .breadcrumb {
  font-size: 13px;
  color: var(--text-secondary);
}

.header .breadcrumb span { color: var(--text-muted); margin: 0 6px; }

.search-box {
  margin-left: auto;
  position: relative;
}

.search-box input {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 12px 6px 32px;
  border-radius: 6px;
  font-size: 13px;
  width: 240px;
  outline: none;
}

.search-box input:focus { border-color: var(--accent); }

.search-box::before {
  content: '⌕';
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
}

.search-results {
  position: absolute;
  top: 100%;
  right: 0;
  width: 400px;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-top: 4px;
  z-index: 100;
  display: none;
}

.search-results.active { display: block; }

.search-result {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
}

.search-result:hover { background: var(--bg-hover); }
.search-result .sr-title { font-size: 13px; font-weight: 600; }
.search-result .sr-path { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.search-result .sr-snippet { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* Sidebar */
.sidebar {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}

.sidebar-section {
  padding: 0 12px;
  margin-bottom: 4px;
}

.sidebar-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  padding: 8px 0 6px;
}

.tree-item {
  display: flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  gap: 6px;
  user-select: none;
}

.tree-item:hover { background: var(--bg-hover); }
.tree-item.active { background: var(--accent-dim); color: var(--accent); }

.tree-item .arrow {
  width: 16px;
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  flex-shrink: 0;
  transition: transform 0.15s;
}

.tree-item .arrow.open { transform: rotate(90deg); }
.tree-item .icon { flex-shrink: 0; font-size: 14px; }
.tree-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.tree-children {
  padding-left: 12px;
  overflow: hidden;
}

.tree-children.collapsed { display: none; }

.stats-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.stats-bar .stat { display: flex; gap: 4px; align-items: center; }
.stats-bar .stat-val { color: var(--text-secondary); font-weight: 600; }

/* Content */
.content {
  overflow-y: auto;
  padding: 32px 48px;
}

.content .note-properties {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.tag {
  background: var(--accent-dim);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
}

.prop-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-secondary);
  padding: 3px 10px;
  background: var(--bg-secondary);
  border-radius: 12px;
}

.prop-item .prop-key { color: var(--text-muted); }

/* Markdown rendered content */
.md-body h1 { font-size: 28px; font-weight: 700; margin: 0 0 16px; color: var(--text-primary); }
.md-body h2 { font-size: 22px; font-weight: 600; margin: 28px 0 12px; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.md-body h3 { font-size: 18px; font-weight: 600; margin: 24px 0 8px; color: var(--text-primary); }
.md-body p { line-height: 1.7; margin: 8px 0; color: var(--text-secondary); }
.md-body ul, .md-body ol { padding-left: 24px; margin: 8px 0; }
.md-body li { line-height: 1.7; color: var(--text-secondary); margin: 2px 0; }
.md-body a { color: var(--accent); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body strong { color: var(--text-primary); }
.md-body code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--peach);
}
.md-body pre {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 12px 0;
}
.md-body pre code {
  background: none;
  padding: 0;
  color: var(--text-primary);
  font-size: 13px;
  line-height: 1.5;
}
.md-body table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 13px;
}
.md-body th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid var(--border);
  color: var(--text-primary);
  font-weight: 600;
}
.md-body td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}
.md-body blockquote {
  border-left: 3px solid var(--accent);
  padding-left: 16px;
  margin: 12px 0;
  color: var(--text-muted);
}

.wikilink {
  color: var(--accent);
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px dashed var(--accent);
}

.wikilink:hover { background: var(--accent-dim); border-radius: 2px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-muted);
  gap: 12px;
}

.empty-state .es-title { font-size: 20px; font-weight: 600; color: var(--text-secondary); }
.empty-state .es-sub { font-size: 14px; }

/* Right panel */
.right-panel {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
}

.rp-section { margin-bottom: 24px; }

.rp-section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.rp-item {
  display: flex;
  align-items: center;
  padding: 6px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  gap: 8px;
  margin-bottom: 2px;
}

.rp-item:hover { background: var(--bg-hover); }

.rp-item .rp-score {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  min-width: 32px;
}

.rp-item .rp-title {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--accent);
}

/* Graph */
#graph-container {
  width: 100%;
  height: 200px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 16px;
}

#graph-container svg { width: 100%; height: 100%; }
.graph-node { cursor: pointer; }
.graph-node circle { fill: var(--accent); }
.graph-node.active circle { fill: var(--peach); r: 6; }
.graph-node text { fill: var(--text-secondary); font-size: 9px; }
.graph-link { stroke: var(--border); stroke-width: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-active); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="layout">
  <!-- Header -->
  <div class="header">
    <div class="logo">KYP-MEM</div>
    <div class="breadcrumb" id="breadcrumb">Know Your Project</div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search notes...">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- Left sidebar -->
  <div class="sidebar" style="display: flex; flex-direction: column;">
    <div style="flex: 1; overflow-y: auto;">
      <div class="sidebar-section">
        <div class="sidebar-section-title">Explorer</div>
        <div id="file-tree"></div>
      </div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="empty-state">
      <div class="es-title">KYP-MEM</div>
      <div class="es-sub">Select a note from the sidebar to view it</div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel" id="right-panel">
    <div id="graph-container"></div>
    <div id="rp-backlinks" class="rp-section" style="display:none;">
      <div class="rp-section-title">Backlinks</div>
      <div id="rp-backlinks-list"></div>
    </div>
    <div id="rp-related" class="rp-section" style="display:none;">
      <div class="rp-section-title">Related Notes</div>
      <div id="rp-related-list"></div>
    </div>
    <div id="rp-outlinks" class="rp-section" style="display:none;">
      <div class="rp-section-title">Outgoing Links</div>
      <div id="rp-outlinks-list"></div>
    </div>
  </div>
</div>

<script>
let currentPath = null;
let treeData = null;
let allNotes = {};

async function fetchJSON(url) {
  const r = await fetch(url);
  return r.json();
}

// --- File Tree ---
function collectNotes(node, list) {
  if (node.type === 'note') {
    list.push(node);
  } else if (node.children) {
    node.children.forEach(c => collectNotes(c, list));
  }
}

function renderTree(node, container, depth) {
  if (node.type === 'folder' && node.name !== 'vault') {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.innerHTML = `<span class="arrow open">&#9654;</span><span class="icon">📁</span><span class="name">${node.name}</span>`;

    const children = document.createElement('div');
    children.className = 'tree-children';

    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const arrow = item.querySelector('.arrow');
      arrow.classList.toggle('open');
      children.classList.toggle('collapsed');
    });

    container.appendChild(item);
    container.appendChild(children);

    (node.children || []).forEach(c => renderTree(c, children, depth + 1));
  } else if (node.type === 'note') {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.dataset.path = node.path;
    item.innerHTML = `<span class="arrow" style="visibility:hidden">&#9654;</span><span class="icon">📄</span><span class="name">${node.name.replace('.md', '')}</span>`;
    item.addEventListener('click', () => loadNote(node.path));
    container.appendChild(item);
  } else if (node.children) {
    node.children.forEach(c => renderTree(c, container, depth));
  }
}

// --- Note rendering ---
async function loadNote(path) {
  currentPath = path;
  const note = await fetchJSON(`/api/note/${path}`);
  if (note.error) return;

  // Update sidebar active
  document.querySelectorAll('.tree-item').forEach(el => {
    el.classList.toggle('active', el.dataset.path === path);
  });

  // Breadcrumb
  const parts = path.replace('.md', '').split('/');
  document.getElementById('breadcrumb').innerHTML = parts.map((p, i) =>
    i < parts.length - 1 ? `${p} <span>/</span>` : `<strong>${p}</strong>`
  ).join(' ');

  // Content
  const contentEl = document.getElementById('content');
  let html = '<div class="note-properties">';
  (note.tags || []).forEach(t => {
    html += `<span class="tag">${t}</span>`;
  });
  Object.entries(note.properties || {}).forEach(([k, v]) => {
    html += `<span class="prop-item"><span class="prop-key">${k}:</span> ${v}</span>`;
  });
  if (note.created) html += `<span class="prop-item"><span class="prop-key">created:</span> ${note.created}</span>`;
  if (note.updated) html += `<span class="prop-item"><span class="prop-key">updated:</span> ${note.updated}</span>`;
  html += '</div>';

  // Render markdown, converting wikilinks first
  let md = note.content || '';
  md = md.replace(/\[\[([^\]]+)\]\]/g, (match, link) => {
    const display = link.includes('#') ? link.split('#').pop() : link;
    return `<span class="wikilink" data-link="${link}">${display}</span>`;
  });

  html += `<div class="md-body">${marked.parse(md)}</div>`;
  contentEl.innerHTML = html;
  contentEl.scrollTop = 0;

  // Wire up wikilinks
  contentEl.querySelectorAll('.wikilink').forEach(el => {
    el.addEventListener('click', () => {
      const link = el.dataset.link.split('#')[0];
      const target = findNotePath(link);
      if (target) loadNote(target);
    });
  });

  // Right panel
  renderRightPanel(note);
  renderGraph(note);
}

function findNotePath(name) {
  const lower = name.toLowerCase();
  for (const [path, note] of Object.entries(allNotes)) {
    const stem = path.split('/').pop().replace('.md', '').toLowerCase();
    if (stem === lower || note.title.toLowerCase() === lower) return path;
  }
  return null;
}

// --- Right Panel ---
function renderRightPanel(note) {
  // Backlinks
  const blSection = document.getElementById('rp-backlinks');
  const blList = document.getElementById('rp-backlinks-list');
  blList.innerHTML = '';
  if (note.backlinks && note.backlinks.length) {
    blSection.style.display = '';
    note.backlinks.forEach(path => {
      const n = allNotes[path];
      const item = document.createElement('div');
      item.className = 'rp-item';
      item.innerHTML = `<span class="rp-title">${n ? n.title : path}</span>`;
      item.addEventListener('click', () => loadNote(path));
      blList.appendChild(item);
    });
  } else {
    blSection.style.display = 'none';
  }

  // Related
  const relSection = document.getElementById('rp-related');
  const relList = document.getElementById('rp-related-list');
  relList.innerHTML = '';
  if (note.related && note.related.length) {
    relSection.style.display = '';
    note.related.forEach(r => {
      const item = document.createElement('div');
      item.className = 'rp-item';
      item.innerHTML = `<span class="rp-score">${r.score.toFixed(2)}</span><span class="rp-title">${r.title}</span>`;
      item.addEventListener('click', () => loadNote(r.path));
      relList.appendChild(item);
    });
  } else {
    relSection.style.display = 'none';
  }

  // Outgoing links
  const outSection = document.getElementById('rp-outlinks');
  const outList = document.getElementById('rp-outlinks-list');
  outList.innerHTML = '';
  if (note.links && note.links.length) {
    outSection.style.display = '';
    note.links.forEach(link => {
      const path = findNotePath(link);
      const item = document.createElement('div');
      item.className = 'rp-item';
      item.innerHTML = `<span class="rp-title">${link}</span>`;
      if (path) item.addEventListener('click', () => loadNote(path));
      else item.style.opacity = '0.5';
      outList.appendChild(item);
    });
  } else {
    outSection.style.display = 'none';
  }
}

// --- Graph ---
function renderGraph(note) {
  const container = document.getElementById('graph-container');
  container.innerHTML = '';

  const nodes = new Map();
  const links = [];

  nodes.set(note.path, { id: note.path, title: note.title, active: true });

  (note.links || []).forEach(link => {
    const path = findNotePath(link);
    if (path && !nodes.has(path)) {
      const n = allNotes[path];
      nodes.set(path, { id: path, title: n ? n.title : link, active: false });
    }
    if (path) links.push({ source: note.path, target: path });
  });

  (note.backlinks || []).forEach(path => {
    if (!nodes.has(path)) {
      const n = allNotes[path];
      nodes.set(path, { id: path, title: n ? n.title : path, active: false });
    }
    links.push({ source: path, target: note.path });
  });

  (note.related || []).forEach(r => {
    if (!nodes.has(r.path)) {
      nodes.set(r.path, { id: r.path, title: r.title, active: false });
    }
  });

  const nodeArray = Array.from(nodes.values());
  if (nodeArray.length < 2) {
    container.innerHTML = '<svg></svg>';
    return;
  }

  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select(container).append('svg')
    .attr('viewBox', `0 0 ${width} ${height}`);

  const simulation = d3.forceSimulation(nodeArray)
    .force('link', d3.forceLink(links).id(d => d.id).distance(60))
    .force('charge', d3.forceManyBody().strength(-100))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide().radius(30));

  const link = svg.selectAll('.graph-link')
    .data(links).enter().append('line')
    .attr('class', 'graph-link');

  const node = svg.selectAll('.graph-node')
    .data(nodeArray).enter().append('g')
    .attr('class', d => 'graph-node' + (d.active ? ' active' : ''))
    .on('click', (e, d) => loadNote(d.id))
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  node.append('circle').attr('r', d => d.active ? 6 : 4);
  node.append('text').text(d => d.title).attr('dx', 10).attr('dy', 3);

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

// --- Search ---
let searchTimeout;
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  const q = searchInput.value.trim();
  if (!q) { searchResults.classList.remove('active'); return; }
  searchTimeout = setTimeout(async () => {
    const results = await fetchJSON(`/api/search?q=${encodeURIComponent(q)}`);
    searchResults.innerHTML = '';
    if (results.length === 0) {
      searchResults.innerHTML = '<div class="search-result"><div class="sr-title" style="color:var(--text-muted)">No results</div></div>';
    } else {
      results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'search-result';
        div.innerHTML = `<div class="sr-title">${r.title}</div><div class="sr-path">${r.path}</div>${r.snippet ? `<div class="sr-snippet">${r.snippet}</div>` : ''}`;
        div.addEventListener('click', () => {
          loadNote(r.path);
          searchResults.classList.remove('active');
          searchInput.value = '';
        });
        searchResults.appendChild(div);
      });
    }
    searchResults.classList.add('active');
  }, 200);
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) searchResults.classList.remove('active');
});

// --- Init ---
async function init() {
  treeData = await fetchJSON('/api/tree');
  const stats = await fetchJSON('/api/stats');

  // Build note lookup
  function walk(node) {
    if (node.type === 'note') {
      allNotes[node.path] = { title: node.name.replace('.md', ''), tags: node.tags || [] };
    }
    (node.children || []).forEach(walk);
  }
  walk(treeData);

  // Fetch full titles
  for (const path of Object.keys(allNotes)) {
    try {
      const note = await fetchJSON(`/api/note/${path}`);
      if (!note.error) allNotes[path] = { title: note.title, tags: note.tags };
    } catch {}
  }

  renderTree(treeData, document.getElementById('file-tree'), 0);

  document.getElementById('stats-bar').innerHTML = `
    <span class="stat"><span class="stat-val">${stats.notes}</span> notes</span>
    <span class="stat"><span class="stat-val">${stats.folders}</span> folders</span>
    <span class="stat"><span class="stat-val">${stats.tags}</span> tags</span>
    <span class="stat"><span class="stat-val">${stats.links}</span> links</span>
  `;
}

init();
</script>
</body>
</html>
